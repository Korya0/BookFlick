name: bookna_app
description: "A new Flutter project."
publish_to: 'none' 

version: 1.0.0+1

environment:
  sdk: ^3.7.2

dependencies:
  # ================= Flutter Core =================
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8

  # ================= State Management & Architecture =================
  bloc: ^9.0.0
  flutter_bloc: ^9.1.0
  get_it: ^9.2.1
  equatable: ^2.0.7
  dartz: ^0.10.1

  # ================= Networking & API =================
  dio: ^5.8.0+1
  connectivity_plus: ^7.1.0
  flutter_cors: ^1.5.0

  # ================= Navigation =================
  go_router: ^17.1.0
  url_launcher: ^6.3.1

  # ================= Storage & Local Data =================
  hive: ^2.2.3
  hive_flutter: ^1.1.0

  # ================= UI & Design =================
  google_fonts: ^8.0.2
  font_awesome_flutter: ^11.0.0
  lottie: ^3.3.1
  shimmer: ^3.0.0
  skeletonizer: ^2.1.3
  carousel_slider: ^5.0.0
  cached_network_image: ^3.4.1
  readmore: ^3.0.0

  # ================= Notifications & Dialogs =================
  another_flushbar: ^1.12.30
  flashy_flushbar: ^1.4.0

  # ================= Utilities & Tools =================
  intl: ^0.20.2
  device_preview: ^1.3.1
  flutter_native_splash: ^2.4.6
  webview_flutter: ^4.10.0


dev_dependencies:
  build_runner: ^2.4.13
  hive_generator: ^2.0.1
  flutter_lints: ^6.0.0
  flutter_test:
    sdk: flutter

dependency_overrides:
  analyzer: 6.4.1
flutter:
  uses-material-design: true
  assets:
    - assets/splash/

